function scrollToSection(id) {

const elementPosition = element.getBoundingClientRect().top + window.pageYOffset;
const offsetPosition = elementPosition - offset;

window.scrollTo({
top: offsetPosition,
behavior: 'smooth'
});
}
}

document.getElementById('app-root').insertAdjacentHTML('afterbegin', navHTML);

const menuButton = document.getElementById('mobile-menu-button');
const menuDropdown = document.getElementById('mobile-menu-dropdown');
const menuIcon = menuButton.querySelector('i');

menuButton.addEventListener('click', () => {
const isOpen = menuDropdown.classList.toggle('hidden');
menuIcon.setAttribute('data-lucide', isOpen ? 'x' : 'menu');
lucide.createIcons();
});

window.scrollToSectionAndClose = (id) => {
scrollToSection(id);
menuDropdown.classList.add('hidden');
menuIcon.setAttribute('data-lucide', 'menu');
lucide.createIcons();
};
}

// --- INITIALIZE PARTICLES (5D EFFECT) ---
function initParticles() {
particlesJS('particles-js', {
"particles": {
"number": {
"value": 60,
"density": { "enable": true, "value_area": 800 }
},
"color": { "value": "#3b82f6" },
"shape": { "type": "circle" },
"opacity": {
"value": 0.5,
"random": true,
"anim": { "enable": true, "speed": 1, "opacity_min": 0.1, "sync": false }
},
"size": {
"value": 3,
"random": true,
"anim": { "enable": true, "speed": 2, "size_min": 0.1, "sync": false }
},
"line_linked": {
"enable": true,
"distance": 150,
"color": "#1e3a8a",
"opacity": 0.4,
"width": 1
},
"move": {
"enable": true,
"speed": 1.5,
"direction": "none",
"random": true,
"straight": false,
"out_mode": "out",
"bounce": false,
"attract": { "enable": true, "rotateX": 600, "rotateY": 1200 }
}
},
"interactivity": {
"detect_on": "canvas",
"events": {
"onhover": { "enable": true, "mode": "grab" },
"onclick": { "enable": true, "mode": "push" },
"resize": true
},
"modes": {
"grab": { "distance": 200, "line_linked": { "opacity": 0.8 } },
"push": { "particles_nb": 4 }
}
},
"retina_detect": true
});
}

// --- APPLICATION INITIALIZATION ---
function initApp() {
renderNavbar();
const mainContent = `
<main>
${renderHero()}
${renderAbout()}
${renderSkills()}
${renderProjects()}
${renderContact()}
</main>
${renderFooter()}
`;
document.getElementById('app-root').insertAdjacentHTML('beforeend', mainContent);
lucide.createIcons();

// Initialize the 5D Data Particle Background
setTimeout(initParticles, 100);
}

window.onload = initApp;
</script>
