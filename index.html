function scrollToSection(id) {

top: offsetPosition,

});
}

document.getElementById('app-root').insertAdjacentHTML('afterbegin', navHTML);

const menuButton = document.getElementById('mobile-menu-button');
const menuDropdown = document.getElementById('mobile-menu-dropdown');
const menuIcon = menuButton.querySelector('i');

menuButton.addEventListener('click', () => {

menuIcon.setAttribute('data-lucide', isOpen ? 'x' : 'menu');
lucide.createIcons();
});

window.scrollToSectionAndClose = (id) => {
scrollToSection(id);

menuIcon.setAttribute('data-lucide', 'menu');
lucide.createIcons();
};
}

// --- GEMINI API INTEGRATION (USED FOR BOTH CHATBOT & SANDBOX) ---

const GEMINI_API_KEY = 'YOUR_GEMINI_API_KEY_HERE'; // ⚠️ Replace this with your actual key!

async function fetchGeminiResponse(prompt) {
if (GEMINI_API_KEY === 'YOUR_GEMINI_API_KEY_HERE') {
return "⚠️ **API Key Missing!** Please add your Gemini API key to the `index.html` file (around line 465) to enable real AI responses.";
}

const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
try {
const response = await fetch(url, {
method: 'POST',
headers: { 'Content-Type': 'application/json' },
body: JSON.stringify({
contents: [{ parts: [{ text: prompt }] }]
})
});

if (!response.ok) throw new Error('API request failed');

const data = await response.json();
return data.candidates[0].content.parts[0].text;
} catch (error) {
console.error("Error:", error);
return "Sorry, I encountered a network error trying to reach the AI. Please try again later.";
}
}


// --- AI SANDBOX LOGIC ---
window.runSandboxAnalysis = async function() {
const inputArea = document.getElementById('sandbox-input');
const outputDiv = document.getElementById('sandbox-output');
const resultsDiv = document.getElementById('sandbox-results');
const btn = document.getElementById('sandbox-btn');

const data = inputArea.value.trim();

if (!data) {
alert("Please paste some data or describe a problem first!");
inputArea.focus();
return;
}

// UI Loading state
outputDiv.classList.remove('hidden');
btn.disabled = true;
btn.innerHTML = '<i data-lucide="loader" class="w-5 h-5 animate-spin"></i> Processing...';
resultsDiv.innerHTML = '<div class="flex items-center gap-3 text-brand-400"><div class="w-2 h-2 bg-brand-400 rounded-full animate-bounce"></div><div class="w-2 h-2 bg-brand-400 rounded-full animate-bounce" style="animation-delay: 0.1s"></div><div class="w-2 h-2 bg-brand-400 rounded-full animate-bounce" style="animation-delay: 0.2s"></div> Analyzing Data Context...</div>';
lucide.createIcons();

// Custom Prompt for Sandbox Analysis
const systemPrompt = `You are a Senior Data Analyst. A user on my portfolio has provided the following data snippet or business problem. 
Analyze it quickly and provide exactly 3 concise, highly professional, actionable business insights or next steps. 
Format your response in Markdown with clear headings and bullet points. 
Do not hallucinate fake numbers, just point out trends, correlations to look for, or formulas you would apply to this type of data.

User Data/Problem:
"""
${data}
"""
`;

const response = await fetchGeminiResponse(systemPrompt);

// Render Results
resultsDiv.innerHTML = marked.parse(response);
btn.disabled = false;
btn.innerHTML = '<i data-lucide="cpu" class="w-5 h-5"></i> <span>Analysis Complete (Run Again)</span>';
lucide.createIcons();
};

window.toggleChat = function() {
const chatWindow = document.getElementById('chat-window');
chatWindow.classList.toggle('hidden');
chatWindow.classList.toggle('flex');
if (!chatWindow.classList.contains('hidden')) {
document.getElementById('chat-input').focus();
}
};

window.handleKeyPress = function(event) {
if (event.key === 'Enter') sendMessage();
};

window.sendMessage = async function() {
const input = document.getElementById('chat-input');
const message = input.value.trim();
if (!message) return;

input.value = '';
appendMessage(message, 'user');
const loadingId = appendLoading();

const systemPrompt = `You are an AI assistant built into the portfolio website of Trivedi Man. 
You answer questions politely and professionally as a representative.
Here is the context about Trivedi:
Role: Data Analyst & BI Specialist.
Location: Surat, Gujarat, India.
Skills: SQL, Data Warehousing, ETL, Python, Pandas, Numpy, Power BI, Tableau, Excel.
Projects: Apple Sales Dashboard, Ecommerce Logistics Analysis, Smart Library System, Edtech Analysis, Hardik Pandya Batting Report.
User Question: ${message}`;

const response = await fetchGeminiResponse(systemPrompt);

document.getElementById(loadingId).remove();
appendMessage(response, 'ai');
};

function appendMessage(text, sender) {
const messagesContainer = document.getElementById('chat-messages');
const div = document.createElement('div');

if (sender === 'user') {
div.className = 'bg-brand-600 text-white p-3 rounded-lg rounded-tr-none max-w-[85%] text-sm ml-auto shadow-md';
div.innerText = text;
} else {
div.className = 'bg-slate-800 text-slate-200 p-3 rounded-lg rounded-tl-none max-w-[85%] text-sm border border-slate-700 shadow-md prose-chat';
div.innerHTML = marked.parse(text); 
}

messagesContainer.appendChild(div);
messagesContainer.scrollTop = messagesContainer.scrollHeight;
}

function appendLoading() {
const messagesContainer = document.getElementById('chat-messages');
const div = document.createElement('div');
const id = 'loading-' + Date.now();
div.id = id;
div.className = 'bg-slate-800 text-slate-400 p-3 rounded-lg rounded-tl-none max-w-[85%] text-sm border border-slate-700 shadow-md flex gap-1 items-center w-16 h-10';
div.innerHTML = `<span class="w-2 h-2 bg-slate-500 rounded-full animate-bounce"></span><span class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></span><span class="w-2 h-2 bg-slate-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></span>`;
messagesContainer.appendChild(div);
messagesContainer.scrollTop = messagesContainer.scrollHeight;
return id;
}
